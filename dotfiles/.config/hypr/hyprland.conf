
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG. (Modified)
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

monitor=HDMI-A-1, 1360x768@60,0x0,1
#monitor=eDP-1, 1920x1080@60,0x0,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun
$browser = firefox


#################
### AUTOSTART ###
#################

exec-once = ~/.config/waybar/launch.sh
exec-once = awww-daemon
exec-once = swaync
exec-once = hypridle


#############################
### ENVIRONMENT VARIABLES ###
#############################

source = ~/Projects/hyprland-rice/dotfiles/.config/hypr/modules/env-variables.conf


###################
### PERMISSIONS ###
###################

source = ~/Projects/hyprland-rice/dotfiles/.config/hypr/modules/permissions.conf


#####################
### LOOK AND FEEL ###
#####################

source = ~/Projects/hyprland-rice/dotfiles/.config/hypr/modules/look-and-feel.conf

#############
### INPUT ###
#############

source = ~/Projects/hyprland-rice/dotfiles/.config/hypr/modules/input.conf


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

##### MISC #####
bind = , PRINT, exec, hyprshot -m window        # Screenshot on selected window
bind = shift, PRINT, exec, hyprshot -m region   # Screenshot on selected region
bind = $SUPER_SHIFT, l, exec, hyprlock  # Execute Hyprlock
bind = $SUPER_SHIFT, B, exec, ~/.config/waybar/launch.sh # Restart Waybar
bind = $mainMod, 0, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit # Logout
bind = $mainMod ALT, W, exec, ~/Projects/hyprland-rice/dotfiles/.config/scripts/theme-switcher.sh
bind = $mainMod SHIFT, W, exec, ~/Projects/hyprland-rice/dotfiles/.config/scripts/wallpaper-picker.sh

##### DISPLAY #####

bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}") # Increase display zoom
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}") # Decrease display zoom
bind = $mainMod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1 # Reset display zoom
#bind = 

##### APPLICATIONS #####

bind = $mainMod, RETURN, exec, $terminal    # Open Terminal
bind = $mainMod, B, exec, $browser          # Open Browser
bind = $mainMod, E, exec, $fileManager      # Open File Manager
bind = ALT, space, exec, $menu              # Open Application Launcher
#bind =

##### WINDOWS #####

#bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill # Quit active window and all open instances
bind = $mainMod, F, fullscreen, 0   # Set active window to fullscreen
bind = $mainMod, M, fullscreen, 1   # Maximize Window (for floating windows; still floating)
bind = $mainMod SHIFT, T, exec, ~/Projects/hyprland-rice/dotfiles/.config/scripts/toggle-allfloat.sh # Toggle floating for all windows of workspace
bind = $mainMod ALT, T, exec, ~/Projects/hyprland-rice/dotfiles/.config/scripts/toggle-floatpin.sh # Toggle active window into floating + pinned mode

bind = $mainMod, T, togglefloating,         # Toggle floating window
bind = $mainMod, P, pseudo,                 # dwindle
bind = $mainMod, J, layoutmsg, togglesplit  # dwindle
bind = $mainMod, Q, killactive,             # Kill active window

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize Windows with mainMod + arrow keys
bind = $mainMod SHIFT, right, resizeactive, 100 0   # Increase window width with keyboard
bind = $mainMod SHIFT, left, resizeactive, -100 0   # Reduce window width with keyboard
bind = $mainMod SHIFT, down, resizeactive, 0 100    # Increase window height with keyboard
bind = $mainMod SHIFT, up, resizeactive, 0 -100     # Reduce window height with keyboard

# Swap Windows with mainMod + arrow keys
bind = $mainMod ALT, left, swapwindow, l            # Swap tiled window left
bind = $mainMod ALT, right, swapwindow, r           # Swap tiled window right
bind = $mainMod ALT, up, swapwindow, u              # Swap tiled window up
bind = $mainMod ALT, down, swapwindow, d            # Swap tiled window down

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Cycle between windows
binde = ALT,Tab,cyclenext               # Cycle between windows
#binde = ALT,Tab,alterzorder             # Bring active window to the top

##### WORKSPACES #####

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod, Tab, workspace, m+1       # Open next workspace
bind = $mainMod SHIFT, Tab, workspace, m-1 # Open previous workspace
bind = $mainMod CTRL, down, workspace, empty # Open the next empty workspace

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

source = ~/Projects/hyprland-rice/dotfiles/.config/hypr/modules/windows-and-workspaces.conf
